name: Daily US-Iran War News Digest

on:
  schedule:
    # 00:00 UTC is 09:00 AM KST
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual run for testing

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Send News Digest
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
        run: node scripts/send_digest.cjs
